{% extends "base.html" %}
{% block content %}
<h2>Добавить транспортное средство</h2>
<form method="post">
    Госномер: <input type="text" name="plate" required><br>
    Марка: <input type="text" name="brand" required><br>
    Модель: <input type="text" name="model" required><br>
    Тип кузова:
    <select name="body_type">
        <option>тент</option>
        <option>рефрижератор</option>
        <option>бортовой</option>
        <option>самосвал</option>
    </select><br>
    Грузоподъёмность (кг): <input type="number" name="capacity" required><br>
    <button type="submit">Добавить</button>
</form>
{% endblock %}
