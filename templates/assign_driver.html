{% extends "base.html" %}
{% block content %}
<h2>Назначить водителя на ТС {{ vehicle.plate }}</h2>
<form method="post">
    <select name="driver_id">
        {% for d in drivers %}
        <option value="{{ d.id }}">{{ d.full_name }}</option>
        {% endfor %}
    </select>
    <button type="submit">Назначить</button>
</form>
{% endblock %}
